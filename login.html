<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: wheat;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-top: 100px;
    }
    .container h2 {
      text-align: center;
    }
    .container input[type="text"],
    .container input[type="password"],
    .container input[type="submit"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      display: inline-block;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .container input[type="submit"] {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    .container input[type="submit"]:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body bgcolor = "wheat">
  <marquee><H1 style="color:Maroon;">WELCOME TO DIET'S BMI PREDICTION MODEL</H1></marquee>
  <div class="container">
    <h2>Login</h2>
    <form action="/index" method="POST" onsubmit="return validateLogin()">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>

      <input type="submit" value="Login">
    </form>
  </div>

  <script>
    function validateLogin() {
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;

      if ((username == 'vandana' && password == 'vandana@1') ||(username == 'hema' && password == 'hema@1') ||(username == 'monica' && password == 'monica@1') ||(username == 'siva' && password == 'siva@1')||(username == 'prem' && password == 'prem@1') ||(username == 'swarna' && password == 'swarna@1'))
      {
        return true;
      } 
      
      else 
      {
        alert('Invalid login credentials. Please try again.');
        return false;
      }
    }
  </script>
</body>
</html>
